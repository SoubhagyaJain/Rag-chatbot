# Streamlit server config for company_policy_rag.
# "none" avoids scanning heavy ML packages (transformers/torch) on every reload,
# which otherwise triggers optional torchvision imports and floods the console.

[server]
address = "0.0.0.0"
port = 8501
fileWatcherType = "none"
headless = true

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#0d9488"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0fdfa"
textColor = "#134e4a"
font = "sans serif"