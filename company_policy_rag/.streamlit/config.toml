# Streamlit server config for company_policy_rag.
# "none" avoids scanning heavy ML packages (transformers/torch) on every reload,
# which otherwise triggers optional torchvision imports and floods the console.

[server]
address = "0.0.0.0"
port = 8501
fileWatcherType = "none"
headless = true

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#2dd4bf"
backgroundColor = "#0a0f14"
secondaryBackgroundColor = "#111827"
textColor = "#e2e8f0"
font = "sans serif"