name: RAG CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "company_policy_rag/**"
  push:
    branches:
      - main
    paths:
      - "company_policy_rag/**"

permissions:
  contents: read

defaults:
  run:
    working-directory: company_policy_rag

env:
  ANONYMIZED_TELEMETRY: "False"
  ENABLE_QUERY_REWRITE: "false"
  RERANKER_DEVICE: cpu
  HF_HOME: ${{ github.workspace }}/company_policy_rag/.cache/huggingface

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: company_policy_rag/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -q

  eval-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: company_policy_rag/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
        working-directory: .

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-nomic-embed-text-v1

      - name: Start Ollama and pull embed model
        run: |
          pkill ollama || true
          sleep 2
          ollama serve &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          ollama pull nomic-embed-text
        working-directory: .

      - name: Build index
        run: python scripts/index_documents.py --force

      - name: CI retrieval smoke gate
        run: python scripts/ci_eval_gate.py